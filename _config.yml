# ==============================================================================
# Site Settings (网站基础设置)
# ==============================================================================
locale: "en-US"
[cite_start]title: "Mingyu Li" # [cite: 1]
title_separator: "-"
[cite_start]name: "Mingyu Li" # [cite: 1]
[cite_start]description: "Master Student at Southeast University | Robotics, Reinforcement Learning, Vision-Tactile Fusion" # [cite: 4, 5]
url: "https://YOUR_GITHUB_USERNAME.github.io" # 将 YOUR_GITHUB_USERNAME 替换为你的 GitHub ID
baseurl: ""
repository: "xmaww/xmaww.github.io" # 替换为你的仓库名
teaser: "profile.png" # 默认分享图片

# ==============================================================================
# Author (作者信息 - 会显示在左侧边栏)
# ==============================================================================
author:
  [cite_start]name: "Mingyu Li" # [cite: 1]
  avatar: "profile.png" # 请将你的照片重命名为 profile.png 并放入 images/ 文件夹
  bio: "Master's student at Southeast University focusing on robotic perception, vision-tactile fusion, dexterous manipulation, and reinforcement learning." [cite_start]# [cite: 4, 5, 34, 64]
  [cite_start]location: "Nanjing, China" # [cite: 6]
  [cite_start]employer: "Southeast University" # [cite: 4]
  [cite_start]email: "220243720@seu.edu.cn" # [cite: 2]
  
  # 社交账号链接 (按需取消注释并填入你的 ID)
  github: "xmaww" 
  # googlescholar: "YOUR_SCHOLAR_ID" # 强烈建议注册并填上谷歌学术ID
  # orcid: "YOUR_ORCID_ID" # 学术常用身份标识
  # linkedin: "YOUR_LINKEDIN_ID"
  # researchgate: "YOUR_RESEARCHGATE_ID"
  # twitter: "YOUR_TWITTER_ID"

# ==============================================================================
# Build settings (构建设置 - 模板默认，一般无需修改)
# ==============================================================================
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate: 5
mathjax: true # 已为你开启数学公式支持，方便展示 RL 或机器人运动学公式

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# ==============================================================================
# Defaults (默认布局设置 - 模板默认，决定不同文件夹的网页结构)
# ==============================================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
