# ==============================================================================
# Site Settings (网站基础设置)
# ==============================================================================
locale: "en-US"
title: "Mingyu Li"
title_separator: "-"
name: "Mingyu Li"
description: "Master Student at Southeast University | Dexterous Manipulation, Vision-Tactile Fusion"
url: "https://xmaww.github.io"
# ==============================================================================
# Author (作者信息 - 会显示在左侧边栏)
# ==============================================================================
author:
  name: "Mingyu Li" # 
  avatar: "/images/Passport.jpg"
  bio: "Master's student at Southeast University focusing on robotic perception, vision-tactile fusion, dexterous manipulation, and reinforcement learning." 
  location: "Nanjing, China"
  employer: "Southeast University"
  email: "220243720@seu.edu.cn"
  
  # 社交账号链接 (按需取消注释并填入你的 ID)
  github: "xmaww" 
  # googlescholar: "YOUR_SCHOLAR_ID" # 强烈建议注册并填上谷歌学术ID
  # orcid: "YOUR_ORCID_ID" # 学术常用身份标识
  # linkedin: "YOUR_LINKEDIN_ID"
  # researchgate: "YOUR_RESEARCHGATE_ID"
  # twitter: "YOUR_TWITTER_ID"

# ==============================================================================
# Build settings (构建设置 - 模板默认，一般无需修改)
# ==============================================================================
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate: 5
mathjax: true # 已为你开启数学公式支持，方便展示 RL 或机器人运动学公式

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# ==============================================================================
# Defaults (默认布局设置 - 模板默认，决定不同文件夹的网页结构)
# ==============================================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
